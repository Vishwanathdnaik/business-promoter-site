<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Business Promoter — The Processor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: #0a0f13;
      color: #cbd5e0;
      overflow-x: hidden;
    }
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.15;
    }
    .glow {
      text-shadow: 0 0 8px #00ffea, 0 0 16px #00ffea;
    }
    .accordion-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.5s ease;
    }
    .accordion-item:hover {
      background-color: #14232e;
    }
    .social-icon {
      margin: 0 8px;
      transition: color 0.3s;
    }
    .social-icon:hover {
      color: #00ffea;
    }
  </style>
</head>
<body class="relative">
  <canvas id="matrix"></canvas>

  <!-- Boot Screen -->
  <div id="boot" class="h-screen flex items-center justify-center bg-black z-10 relative">
    <div class="text-green-500 terminal-lines text-sm space-y-2">
      <p>Booting Business Promoter OS...</p>
    </div>
  </div>

  <!-- Main Section -->
  <div id="main" class="hidden">
    <!-- Your full sections here like Services, Contact, Socials, Footer -->
  </div>

  <!-- Full JS here -->
</body>
</html>
