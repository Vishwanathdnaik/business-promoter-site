<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Business Promoter — The Processor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: #0a0f13;
      color: #cbd5e0;
      overflow-x: hidden;
    }
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.15;
    }
    .glow {
      text-shadow: 0 0 8px #00ffea, 0 0 16px #00ffea;
    }
    .accordion-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.5s ease;
    }
    .accordion-item:hover {
      background-color: #14232e;
    }
    .social-icon {
      margin: 0 8px;
      transition: color 0.3s;
    }
    .social-icon:hover {
      color: #00ffea;
    }
  </style>
</head>
<body class="relative">

  <!-- Matrix Background -->
  <canvas id="matrix"></canvas>

  <!-- Boot Screen -->
  <div id="boot" class="h-screen flex items-center justify-center bg-black z-10 relative">
    <div class="text-green-500 terminal-lines text-sm space-y-2 text-left">
      <p>Booting Business Promoter OS...</p>
      <p>Loading modules...</p>
      <p>Initializing neural engine...</p>
      <p>Finalizing startup...</p>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main" class="hidden">
    <section class="min-h-screen flex flex-col items-center justify-center text-center px-4">
      <h1 class="text-4xl md:text-6xl glow font-bold">Business Promoter</h1>
      <p class="text-xl glow mt-4">All-in-One Digital Marketing Expertise</p>
      <button onclick="alert('Add scroll or section link')" class="mt-6 px-6 py-3 bg-green-500 glow rounded">Explore Services</button>
    </section>

    <!-- Footer -->
    <footer class="py-6 text-center text-gray-500">© 2025 Business Promoter</footer>
  </div>

  <!-- JavaScript -->
  <script>
    // Boot Screen Logic
    document.addEventListener('DOMContentLoaded', function () {
      setTimeout(() => {
        const boot = document.getElementById('boot');
        const main = document.getElementById('main');
        if (boot) boot.style.display = 'none';
        if (main) main.style.display = 'block';
      }, 3000); // 3-second boot animation
    });

    // Matrix Background
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    const cols = canvas.width / 20;
    const arr = Array(Math.floor(cols)).fill(1);
    function draw() {
      ctx.fillStyle = 'rgba(0,10,20,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff41';
      ctx.font = '15pt monospace';
      arr.forEach((y, i) => {
        const text = String.fromCharCode(1e5 + Math.random() * 33);
        const x = i * 20;
        ctx.fillText(text, x, y * 20);
        arr[i] = y * 20 > canvas.height && Math.random() > 0.975 ? 0 : y + 1;
      });
    }
    setInterval(draw, 75);
  </script>

</body>
</html>
